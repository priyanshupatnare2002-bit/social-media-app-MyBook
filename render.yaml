services:
  - type: web
    name: social-media-web-app
    env: python
    buildCommand: "pip install -r requirements.txt && python socials/manage.py collectstatic --noinput && python socials/manage.py migrate && python socials/manage.py seed_demo"
    startCommand: "gunicorn socials.wsgi:application --chdir socials"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_SECRET_KEY
        generateValue: true
